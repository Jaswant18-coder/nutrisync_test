services:
  - type: web
    name: nutrisync-backend
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_D1_DATABASE_ID
        sync: false
      - key: CF_API_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
